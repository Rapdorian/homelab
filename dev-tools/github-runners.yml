githubConfigUrl: "https://github.com/Rapdorian/homelab"
githubConfigSecret:
  github_token: ${token}

listenerTemplate:
  spec:
    containers:
      - name: listener
        securityContext:
          runAsUser: 1000
  metadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
