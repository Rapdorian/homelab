grafana.ini:
  server:
    domain: grafana.svc.jpruitt.dev
    root_url: "%(protocol)s://%(domain)s"
  auth.generic_oauth:
    enabled: true
    name: "Authentik"
    allow_sign_up: true
    scopes: "openid email profile groups"
    email_attribute_name: "email"
    auth_url: "https://auth.svc.jpruitt.dev/application/o/authorize/"
    token_url: "http://authentik-server.authentik.svc.cluster.local/application/o/token/"
    api_url: "http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/"
    signout_redirect_url: "https://auth.svc.jpruitt.dev/application/o/grafana/end-session/"
    role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
  database:
    type: postgres
    host: "postgresql.database.svc.cluster.local"
    name: "grafana"
    user: "grafana_user"
    ssl_mode: disable
persistence:
  type: pvc
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
ingress:
  enabled: true
  hosts:
    - "grafana.svc.jpruitt.dev"
  path: "/"
envValueFrom:

  GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
    secretKeyRef:
      name: grafana-postgres-secret
      key: auth-client-id
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-postgres-secret
      key: auth-client-secret
  GF_DATABASE_PASSWORD:
    secretKeyRef:
      name: grafana-postgres-secret
      key: postgres-password

env:
  GF_SERVER_ROOT_URL: https://grafana.svc.jpruitt.dev

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.metric.svc.cluster.local
        isDefault: true
        editable: true

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 1
      datasource: Prometheus
    k8s-cluster-overview:
      gnetId: 7249
      revision: 1
      datasource: Prometheus
    k8s-scheduling:
      gnetId: 13533
      revision: 1
      datasource: Prometheus

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

initChownData:
  enabled: false
