# CI runner configuration - managed by Terraform
githubConfigUrl: "https://github.com/Rapdorian/homelab"
githubConfigSecret: "github-token"

listenerTemplate:
  spec:
    containers:
      - name: listener
        securityContext:
          runAsUser: 1000
  metadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
