name: CI Runners
on:
  push:
    paths:
      - 'ci-runner/**'
      - '.github/workflows/ci-runner.yml'

jobs:
  deploy:
    runs-on: homelab
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: cd ci-runner && rm -rf .terraform && terraform init && terraform apply -auto-approve -lock=false

      - name: Cleanup state lock on failure or cancel
        if: cancelled() || failure()
        run: kubectl delete lease lock-tfstate-default-ci-runner -n terraform-states --ignore-not-found=true
