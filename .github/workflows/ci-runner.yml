name: CI Runners
on:
  push:
    paths:
      - 'ci-runner/**'
      - '.github/workflows/ci-runner.yml'

jobs:
  deploy:
    runs-on: homelab
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: make ci-runner
