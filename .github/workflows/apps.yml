name: Apps
on:
  push:
    paths:
      - 'apps/**'
      - '.github/workflows/apps.yml'

jobs:
  deploy:
    runs-on: homelab
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: hashicorp/setup-terraform@v4

      - name: Wait for core/identity layer
        run: |
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          for i in $(seq 1 30); do
            STATUS=$(curl -sk -H "Authorization: Bearer $TOKEN" \
              https://kubernetes.default.svc/apis/apps/v1/namespaces/authentik/deployments/authentik-server | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status']['conditions'][0]['type'])" 2>/dev/null || echo "NotReady")
            if [ "$STATUS" = "Available" ]; then
              echo "core/identity is ready"
              exit 0
            fi
            echo "Waiting for core/identity... (attempt $i/30)"
            sleep 10
          done
          echo "core/identity not ready after 5 minutes"
          exit 1

      - run: cd apps && rm -rf .terraform && terraform init && terraform apply -auto-approve -lock-timeout=300s

      - name: Cleanup state lock on failure or cancel
        if: cancelled() || failure()
        run: |
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          curl -sk -X DELETE \
            -H "Authorization: Bearer $TOKEN" \
            https://kubernetes.default.svc/apis/coordination.k8s.io/v1/namespaces/terraform-states/leases/lock-tfstate-default-apps
