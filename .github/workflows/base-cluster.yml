name: Base cluster
on:
  push:
    paths:
      - 'core/base/**'
      - '.github/workflows/base-cluster.yml'

jobs:
  deploy:
    runs-on: homelab
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: sudo apt update
      - run: sudo apt install make
      - run: make base
