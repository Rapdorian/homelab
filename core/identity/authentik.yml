authentik:
  secret_key: "${secret_key}"
  bootstrap_password: "${authentik_token}"
  bootstrap_token: "${authentik_token}"
  bootstrap_email: "admin@jpruitt.dev"
  postgresql:
    host: "postgresql.database.svc.cluster.local"
    name: "authentik"
    user: "authentik_user"
    password: "${password}"
    port: 5432
  ldap:
    bind_cn: "ldap-service"
    bind_password: "${ldap_password}"
    tls_enabled: false
server:
  ingress:
    enabled: true
    hosts:
      - auth.svc.jpruitt.dev
  ldap:
    enabled: true
    service:
      type: ClusterIP
postgresql:
  enabled: false


