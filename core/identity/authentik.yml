authentik:
  secret_key: "${secret_key}"
  bootstrap_password: "${authentik_token}"
  bootstrap_token: "${authentik_token}"
  bootstrap_email: "admin@jpruitt.dev"
  postgresql:
    host: "postgresql.database.svc.cluster.local"
    name: "authentik"
    user: "authentik_user"
    password: "${password}"
    port: 5432
server:
  ingress:
    enabled: true
    hosts:
      - auth.svc.jpruitt.dev
ldap:
  enabled: true
  bind_cn: "cn=ldapservice,ou=users,dc=goauthentik,dc=io"
  bind_password: "${ldap_password}"
  tls_enabled: false
postgresql:
  enabled: false


